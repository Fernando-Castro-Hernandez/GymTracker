services:
  postgres:
    image: postgres:16
    container_name: gymtracker-db
    environment:
      POSTGRES_DB: gymtracker
      POSTGRES_USER: gymtracker_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # Host 5433 -> contenedor 5432. Se usa 5433 en el host para no chocar con
    # un PostgreSQL nativo que pueda estar escuchando en el 5432.
    ports:
      - "5433:5432"
    volumes:
      - gymtracker_data:/var/lib/postgresql/data

volumes:
  gymtracker_data: