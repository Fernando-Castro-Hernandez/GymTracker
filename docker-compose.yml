services:
  postgres:
    image: postgres:16
    container_name: gymtracker-db
    environment:
      POSTGRES_DB: gymtracker
      POSTGRES_USER: gymtracker_user
      POSTGRES_PASSWORD: dev_local_password_2026
    ports:
      - "5432:5432"
    volumes:
      - gymtracker_data:/var/lib/postgresql/data

volumes:
  gymtracker_data: